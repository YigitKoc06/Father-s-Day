<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Babalar Günü için özel hazırlanmış fotoğraf kartları" />
  <title>Canım Babam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS RESET & BASE ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #0f1117;
      --color-bg-card: #1a1d27;
      --color-accent: #c8a45a;
      --color-accent-light: #e8cc7a;
      --color-accent-dark: #9a7b3a;
      --color-text: #f0ece4;
      --color-text-muted: #8a8690;
      --color-border: rgba(200, 164, 90, 0.2);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, sans-serif;
      --card-width: min(420px, 88vw);
      --card-radius: 16px;
      --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ===== SUBTLE BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(200, 164, 90, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(200, 164, 90, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(200, 164, 90, 0.03) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== CARD STACK CONTAINER ===== */
    #card-stack {
      position: relative;
      width: var(--card-width);
      height: 580px;
      perspective: 1200px;
      z-index: 1;
    }

    /* ===== INDIVIDUAL CARD ===== */
    .card {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color-bg-card);
      border-radius: var(--card-radius);
      border: 1px solid var(--color-border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.7s var(--transition-smooth),
                  opacity 0.7s var(--transition-smooth),
                  box-shadow 0.3s ease;
      will-change: transform, opacity;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--card-radius);
      background: linear-gradient(
        135deg,
        rgba(200, 164, 90, 0.08) 0%,
        transparent 50%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Card stacking effect - cards behind are slightly scaled down and offset */
    .card[data-position="0"] {
      z-index: 10;
      transform: translateY(0) scale(1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(200, 164, 90, 0.05);
    }
    .card[data-position="0"]:hover {
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6), 0 0 50px rgba(200, 164, 90, 0.08);
      transform: translateY(-4px) scale(1.005);
    }

    .card[data-position="1"] {
      z-index: 9;
      transform: translateY(12px) scale(0.96);
      opacity: 0.7;
      filter: brightness(0.8);
    }

    .card[data-position="2"] {
      z-index: 8;
      transform: translateY(24px) scale(0.92);
      opacity: 0.4;
      filter: brightness(0.6);
    }

    .card[data-position="3"] {
      z-index: 7;
      transform: translateY(32px) scale(0.88);
      opacity: 0.15;
      filter: brightness(0.4);
    }

    /* Hidden cards */
    .card[data-position="hidden"] {
      z-index: 0;
      opacity: 0;
      pointer-events: none;
      transform: translateY(40px) scale(0.85);
    }

    /* Swipe animations */
    .card.swipe-left {
      transform: translateX(-140%) rotate(-18deg) !important;
      opacity: 0 !important;
      pointer-events: none;
      z-index: 20 !important;
    }

    .card.swipe-right {
      transform: translateX(140%) rotate(18deg) !important;
      opacity: 0 !important;
      pointer-events: none;
      z-index: 20 !important;
    }

    /* ===== CARD IMAGE AREA ===== */
    .card-image {
      width: 100%;
      height: 380px;
      overflow: hidden;
      position: relative;
      background: #12141c;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .card[data-position="0"]:hover .card-image img {
      transform: scale(1.03);
    }

    /* Placeholder when no image is loaded */
    .card-image .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(135deg, #1a1d27 0%, #12141c 100%);
      color: var(--color-text-muted);
      font-size: 14px;
    }

    .card-image .placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.3;
    }

    /* ===== CARD TEXT AREA ===== */
    .card-text {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 28px;
      text-align: center;
      position: relative;
    }

    .card-text::before {
      content: '';
      position: absolute;
      top: 0;
      left: 28px;
      right: 28px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-accent-dark), transparent);
      opacity: 0.3;
    }

    .card-text p {
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--color-text);
      letter-spacing: 0.01em;
    }

    /* ===== CARD COUNTER ===== */
    #card-counter {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 50;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    /* ===== TAP HINT ===== */
    #tap-hint {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--color-accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      z-index: 50;
      animation: hintPulse 2.5s ease-in-out infinite;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.8; transform: translateX(-50%) translateY(-3px); }
    }

    /* ===== FINAL MESSAGE SCREEN ===== */
    #final-message {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1s ease, visibility 1s ease;
      background: var(--color-bg);
    }

    #final-message.visible {
      opacity: 1;
      visibility: visible;
    }

    #final-message::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 50% 50%, rgba(200, 164, 90, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    #final-message h1 {
      font-family: var(--font-display);
      font-size: clamp(32px, 8vw, 64px);
      font-weight: 800;
      color: var(--color-accent);
      text-align: center;
      line-height: 1.2;
      letter-spacing: 0.02em;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(30px) scale(0.95);
      transition: opacity 0.8s ease 0.3s, transform 0.8s var(--transition-smooth) 0.3s;
    }

    #final-message.visible h1 {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    #final-message .sub-text {
      font-family: var(--font-body);
      font-size: clamp(14px, 3vw, 18px);
      color: var(--color-text-muted);
      text-align: center;
      letter-spacing: 0.05em;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease 0.7s, transform 0.8s var(--transition-smooth) 0.7s;
    }

    #final-message.visible .sub-text {
      opacity: 1;
      transform: translateY(0);
    }

    /* Decorative line */
    #final-message .deco-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.8s ease 0.5s;
    }

    #final-message.visible .deco-line {
      opacity: 1;
    }

    /* ===== FLOATING PARTICLES (subtle) ===== */
    .particle {
      position: fixed;
      width: 3px;
      height: 3px;
      background: var(--color-accent);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== SWIPE INDICATOR ARROWS ===== */
    .swipe-arrows {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 -20px;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card[data-position="0"]:hover ~ .swipe-arrows,
    .swipe-arrows.show {
      opacity: 1;
    }

    .swipe-arrow {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-accent);
      opacity: 0.4;
      transform: translateX(0);
    }

    .swipe-arrow.left {
      animation: arrowLeft 2s ease-in-out infinite;
      margin-left: -50px;
    }

    .swipe-arrow.right {
      animation: arrowRight 2s ease-in-out infinite;
      margin-right: -50px;
    }

    @keyframes arrowLeft {
      0%, 100% { transform: translateX(0); opacity: 0.2; }
      50% { transform: translateX(-6px); opacity: 0.6; }
    }

    @keyframes arrowRight {
      0%, 100% { transform: translateX(0); opacity: 0.2; }
      50% { transform: translateX(6px); opacity: 0.6; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-height: 700px) {
      #card-stack {
        height: 480px;
      }
      .card-image {
        height: 300px;
      }
    }

    @media (max-height: 600px) {
      #card-stack {
        height: 420px;
      }
      .card-image {
        height: 260px;
      }
    }
  </style>
</head>
<body>

  <!-- Card Stack -->
  <div id="card-stack">
    <!-- Cards will be generated by JavaScript -->

    <!-- Swipe direction arrows -->
    <div class="swipe-arrows" id="swipe-arrows">
      <div class="swipe-arrow left">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="swipe-arrow right">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </div>
  </div>

  <!-- Tap hint -->
  <div id="tap-hint">dokun ve kaydır</div>

  <!-- Card counter -->
  <div id="card-counter"></div>

  <!-- Final message -->
  <div id="final-message">
    <h1>Babalar Günün<br>Kutlu Olsun</h1>
    <div class="deco-line"></div>
    <p class="sub-text">Seni çok seviyorum ❤️</p>
  </div>

  <script>
    // ============================================================
    // CARD DATA - Resimleri ve yazıları buraya ekleyeceğiz
    // ============================================================
    const cardData = [
      {
        image: "images/1..png",
        text: "Bana her zaman şefkatle yaklaştın."
      },
      {
        image: "images/2..png",
        text: "Her şekilde hayata gülümsüyorsun."
      },
      {
        image: "images/3..jpg",
        text: "Eşine güven veriyorsun."
      },
      {
        image: "images/4..jpeg",
        text: "Hayata adımlarımı seninle attım."
      },
      {
        image: "images/5..jpeg",
        text: "Hayat yoldaşına aşk katıyorsun."
      },
      {
        image: "images/6..jpeg",
        text: "Maddi, manevi her konuda destek çıkıyorsun."
      },
      {
        image: "images/7..jpg",
        text: "Herkese iyilikle yaklaşıyorsun."
      }
    ];

    // ============================================================
    // APP STATE
    // ============================================================
    let currentIndex = 0;
    let isAnimating = false;
    let swipeDirection = 'left'; // alternates between left and right

    const stack = document.getElementById('card-stack');
    const counter = document.getElementById('card-counter');
    const tapHint = document.getElementById('tap-hint');
    const finalMessage = document.getElementById('final-message');
    const swipeArrows = document.getElementById('swipe-arrows');

    // ============================================================
    // CREATE CARDS
    // ============================================================
    function createCards() {
      cardData.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${index}`;
        card.dataset.index = index;

        // Image section
        const imageDiv = document.createElement('div');
        imageDiv.className = 'card-image';

        if (data.image) {
          const img = document.createElement('img');
          img.src = data.image;
          img.alt = `Fotoğraf ${index + 1}`;
          img.draggable = false;
          imageDiv.appendChild(img);
        } else {
          // Placeholder
          const placeholder = document.createElement('div');
          placeholder.className = 'placeholder';
          placeholder.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <span>Fotoğraf ${index + 1}</span>
          `;
          imageDiv.appendChild(placeholder);
        }

        // Text section
        const textDiv = document.createElement('div');
        textDiv.className = 'card-text';
        textDiv.innerHTML = `<p>${data.text}</p>`;

        card.appendChild(imageDiv);
        card.appendChild(textDiv);

        // Click handler
        card.addEventListener('click', () => handleCardClick(index));

        // Touch/swipe support
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        card.addEventListener('touchstart', (e) => {
          if (index !== currentIndex || isAnimating) return;
          startX = e.touches[0].clientX;
          isDragging = true;
          card.style.transition = 'none';
        }, { passive: true });

        card.addEventListener('touchmove', (e) => {
          if (!isDragging) return;
          currentX = e.touches[0].clientX;
          const diff = currentX - startX;
          const rotate = diff * 0.08;
          card.style.transform = `translateX(${diff}px) rotate(${rotate}deg)`;
          card.style.opacity = Math.max(0, 1 - Math.abs(diff) / 400);
        }, { passive: true });

        card.addEventListener('touchend', () => {
          if (!isDragging) return;
          isDragging = false;
          const diff = currentX - startX;
          card.style.transition = '';

          if (Math.abs(diff) > 80) {
            // Swipe threshold met
            swipeDirection = diff > 0 ? 'right' : 'left';
            dismissCard(index);
          } else {
            // Snap back
            updatePositions();
          }
        });

        stack.appendChild(card);
      });

      updatePositions();
      updateCounter();
    }

    // ============================================================
    // HANDLE CARD CLICK
    // ============================================================
    function handleCardClick(index) {
      if (index !== currentIndex || isAnimating) return;
      dismissCard(index);
    }

    // ============================================================
    // DISMISS CARD (swipe away)
    // ============================================================
    function dismissCard(index) {
      if (isAnimating) return;
      isAnimating = true;

      const card = document.getElementById(`card-${index}`);
      
      // Alternate direction
      card.classList.add(`swipe-${swipeDirection}`);
      swipeDirection = swipeDirection === 'left' ? 'right' : 'left';

      // Hide hint after first swipe
      tapHint.style.opacity = '0';
      tapHint.style.visibility = 'hidden';

      setTimeout(() => {
        currentIndex++;
        updatePositions();
        updateCounter();
        isAnimating = false;

        // Check if all cards are done
        if (currentIndex >= cardData.length) {
          showFinalMessage();
        }
      }, 600);
    }

    // ============================================================
    // UPDATE CARD POSITIONS
    // ============================================================
    function updatePositions() {
      cardData.forEach((_, index) => {
        const card = document.getElementById(`card-${index}`);
        if (!card) return;

        // Already swiped away
        if (card.classList.contains('swipe-left') || card.classList.contains('swipe-right')) {
          return;
        }

        const relativePos = index - currentIndex;

        if (relativePos < 0) {
          card.dataset.position = 'hidden';
        } else if (relativePos <= 3) {
          card.dataset.position = relativePos;
        } else {
          card.dataset.position = 'hidden';
        }
      });
    }

    // ============================================================
    // UPDATE COUNTER
    // ============================================================
    function updateCounter() {
      if (currentIndex < cardData.length) {
        counter.textContent = `${currentIndex + 1} / ${cardData.length}`;
        counter.style.opacity = '0.6';
      } else {
        counter.style.opacity = '0';
      }
    }

    // ============================================================
    // SHOW FINAL MESSAGE
    // ============================================================
    function showFinalMessage() {
      // Hide card stack
      stack.style.opacity = '0';
      stack.style.transition = 'opacity 0.5s ease';
      counter.style.opacity = '0';

      // Create particles
      createParticles();

      // Show final message
      setTimeout(() => {
        finalMessage.classList.add('visible');
      }, 500);
    }

    // ============================================================
    // CREATE SUBTLE PARTICLES FOR FINAL SCREEN
    // ============================================================
    function createParticles() {
      const count = 30;
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        document.body.appendChild(particle);

        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        const size = Math.random() * 3 + 1;
        const delay = Math.random() * 3;
        const duration = Math.random() * 4 + 3;

        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;

        particle.animate([
          { opacity: 0, transform: 'translateY(0) scale(0)' },
          { opacity: 0.6, transform: `translateY(-${Math.random() * 100 + 50}px) scale(1)` },
          { opacity: 0, transform: `translateY(-${Math.random() * 200 + 100}px) scale(0)` }
        ], {
          duration: duration * 1000,
          delay: delay * 1000,
          iterations: Infinity,
          easing: 'ease-in-out'
        });
      }
    }

    // ============================================================
    // INITIALIZE
    // ============================================================
    createCards();
  </script>

</body>
</html>
